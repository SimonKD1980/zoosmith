<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZooSmith V0.2.24</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<div id="ticker">Welcome to your zoo...</div>
<div class="stats-bar">
<span>💰 $<span id="money">10,000</span></span>
<span>📅 Day <span id="day">1</span></span>
<span>🗓 Month <span id="month">1</span></span>
<span>📆 Year <span id="year">1</span></span>
<span>📈 $<span id="income">0</span>/day</span>
<span>🎟 $<span id="ticketPrice">20</span></span>
<span>✨ Novelty: <span id="novelty">100%</span></span>
<span id="staffingStatus">🧑‍🌾 <span id="staffSlots">0/0</span></span>
</div>
</header>

<div class="nav">
<button onclick="showSection('leaderboard', event)">🏆 Leaderboard</button>
<button class="active" onclick="showSection('shop', event)">🛒 Shop</button>
<button onclick="showSection('exhibits', event)">🏞 Exhibits</button>
<button onclick="showSection('research', event)">🔬 Research</button>
<button onclick="showSection('visitors', event)">👥 Visitors</button>
<button onclick="showSection('supplies', event)">🍽 Supplies</button>
<button onclick="showSection('achievements', event)">🏆 Achievements</button>
<button onclick="showSection('reports', event)">📊 Reports</button>
<button onclick="showSection('amenities', event)">🏪 Amenities</button>
<button onclick="showSection('facilities', event)">🏗 Facilities</button>
<button onclick="showSection('staff', event)">👷 Staff</button>
</div>

<div style="padding: 10px; display: flex; gap: 10px;">
<button id="resetGameBtn" class="removeBtn">🧨 Reset Zoo</button>
<button id="buildExhibitBtn" class="buildBtn">🏗 Build Exhibit</button>
<button id="endDayBtn" class="moveBtn">⏭ End Day</button>
</div>

<div id="facilities" class="section"></div>
<div id="shop" class="section active"></div>
<div id="exhibits" class="section"></div>
<div id="research" class="section"></div>
<div id="visitors" class="section"></div>
<div id="supplies" class="section"></div>
<div id="amenities" class="section"></div>
<div id="achievements" class="section"></div>
<div id="reports" class="section"></div>
<div id="staff" class="section"></div>
<div id="leaderboard" class="section"></div>

<!-- Modals -->
<div id="buyModal" class="modal">
<div class="modal-content">
<h3>Select Exhibit</h3>
<select id="exhibitSelect"></select>
<select id="genderSelect"><option value="male">Male</option><option value="female">Female</option></select>
<button id="confirmBuyBtn">Confirm</button>
<button onclick="closeBuyModal()" class="removeBtn">Cancel</button>
</div>
</div>
<div id="animalInfoModal" class="modal">
<div class="modal-content">
<div id="animalInfoContent"></div>
<button onclick="closeAnimalInfo()" class="removeBtn">Close</button>
</div>
</div>
<div id="buildModal" class="modal">
<div class="modal-content">
<h3>🏗 Build New Exhibit</h3>
<p style="color: var(--muted); margin-bottom: 15px;">Choose the size of your new exhibit.</p>
<div id="buildSizeOptions" style="display: flex; flex-direction: column; gap: 10px;"></div>
<button onclick="closeBuildModal()" class="removeBtn" style="margin-top: 10px;">Cancel</button>
</div>
</div>
<div id="eventModal" class="modal">
<div class="modal-content" id="eventModalContent" style="max-width: 500px; border: 2px solid var(--warn);">
<div style="text-align: center; margin-bottom: 15px;">
<span id="eventIcon" style="font-size: 4rem; display: block; margin-bottom: 10px;">📢</span>
<h2 id="eventName" style="color: var(--warn); margin: 0;">Event Name</h2>
</div>
<p id="eventDesc" style="color: var(--muted); text-align: center; margin-bottom: 20px; font-size: 1.1rem;">Description goes here.</p>
<div id="eventChoices" style="display: flex; flex-direction: column; gap: 10px;"></div>
</div>
</div>
<div id="upgradeModal" class="modal">
<div class="modal-content">
<h3>🏗 Select Upgrade</h3>
<div id="upgradeOptions"></div>
<button onclick="closeUpgradeModal()" class="removeBtn">Close</button>
</div>
</div>

<div id="toast-container"></div>

<!-- Load Main JS as Module -->
<script type="module" src="js/main.js"></script>
</body>
</html>
